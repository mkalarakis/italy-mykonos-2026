.lock-circle.mine{cursor:pointer}

.lock-circle.locked{border-color:transparent;color:white}

.lock-circle.lc-Milton{background:#1D9E75;border-color:#1D9E75}
.lock-circle.lc-Sofia{background:#D4537E;border-color:#D4537E}
.lock-circle.lc-Dua{background:#EF9F27;border-color:#EF9F27}

.pop{animation:goldenPop .4s ease}

.add-option-btn:hover{border-color:#534AB7;color:#534AB7}
.empty-state{text-align:center;padding:1.5rem;color:#bbb;font-size:13px}

.hotel-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f0f0f0}
.hotel-icon{width:36px;height:36px;border-radius:10px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hotel-header-text{flex:1}
.hotel-header-text h3{font-size:14px;font-weight:600}
.hotel-header-text p{font-size:12px;color:#888;margin-top:2px}
.hotel-body{padding:12px 16px}

.modal h2{font-size:17px;font-weight:600;margin-bottom:1rem}
.modal-form-group{margin-bottom:12px}
.modal-form-group label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}

.btn-primary{flex:1;padding:11px;background:#534AB7;color:white;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer}
.btn-primary:hover{background:#3C3489}
.btn-secondary{padding:11px 16px;background:#f5f5f5;color:#555;border:none;border-radius:10px;font-size:14px;cursor:pointer}
.vote-list{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem}
.vote-item{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border:1px solid #ebebeb;border-radius:10px;background:#fafafa}
.vote-item-name{font-size:14px;font-weight:500}
.vote-item-link{font-size:12px;color:#534AB7;text-decoration:none}
.star{width:26px;height:26px;border-radius:6px;border:1px solid #e0e0e0;background:white;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;font-weight:600;color:#aaa}
.star.selected{background:#534AB7;border-color:#534AB7;color:white}
.vote-score-display{font-size:13px;font-weight:600;color:#534AB7;min-width:28px;text-align:center}
.vote-progress{height:4px;background:#f0f0f0;border-radius:2px;margin-top:6px;overflow:hidden}
.vote-progress-fill{height:100%;background:#534AB7;border-radius:2px}
.loading{text-align:center;padding:3rem;color:#aaa;font-size:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:10px 20px;border-radius:30px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.summary-banner{background:#534AB7;border-radius:14px;padding:1.25rem 1.5rem;color:white;margin-bottom:1.25rem}
.summary-banner h2{font-size:20px;font-weight:700}
.summary-banner p{font-size:13px;opacity:.85;margin-top:4px}
.summary-stats{display:flex;gap:1.5rem;margin-top:1rem}
.stat-num{font-size:22px;font-weight:700}
.stat-label{font-size:11px;opacity:.8}
.lb-card{background:white;border-radius:14px;border:1px solid #ebebeb;margin-bottom:12px;overflow:hidden}
.lb-person{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid #f5f5f5}
.lb-person:last-child{border-bottom:none}
.lb-rank{font-size:18px;font-weight:700;width:28px;text-align:center;color:#aaa}
.lb-rank.gold{color:#F5A623}
.lb-rank.silver{color:#9B9B9B}

.lb-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:2px solid transparent;flex-shrink:0}

.lb-score{font-size:20px;font-weight:700;color:#534AB7}
.lb-score-label{font-size:10px;color:#aaa;text-align:right}
.lb-bar-wrap{background:#f0f0f0;border-radius:4px;height:6px;margin-top:6px;overflow:hidden}
.lb-bar{height:100%;border-radius:4px}
.lb-section-title{font-size:13px;font-weight:600;color:#555;padding:12px 16px 4px;border-bottom:1px solid #f5f5f5}
.lb-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border-bottom:1px solid #f5f5f5}
.lb-stat{padding:10px 16px;text-align:center;border-right:1px solid #f5f5f5}
.lb-stat:last-child{border-right:none}
.lb-stat-num{font-size:18px;font-weight:700;color:#534AB7}

.final-traveler{display:flex;flex-direction:column;align-items:center;gap:4px}

.final-day-header{padding:12px 16px;border-bottom:1px solid #f5f5f5;display:flex;align-items:center;justify-content:space-between}
.final-day-date{font-size:13px;font-weight:700}
.final-day-location{font-size:12px;color:#888;margin-top:1px}

.final-item-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.final-item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.final-item-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.final-item-score{font-size:13px;font-weight:700;flex-shrink:0}
.final-item-pending{font-size:12px;font-style:italic;color:#ccc}

.fi-locked{border-color:#F5A623!important;box-shadow:0 0 0 1px #F5A62322}
.final-lock-wrap{display:flex;align-items:center;gap:4px}
.flc{width:18px;height:18px;border-radius:50%;border:2px solid #e0e0e0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#ddd;flex-shrink:0}
.flc.locked{color:white;border-color:transparent}
.flc.lc-Sammy{background:#534AB7}.flc.lc-Milton{background:#1D9E75}.flc.lc-Sofia{background:#D4537E}.flc.lc-Dua{background:#EF9F27}
.final-lock-icon{font-size:16px;margin-left:3px}
@media(max-width:400px){.top-bar-title{font-size:14px}.nav-tab{padding:10px 9px;font-size:11px}}

<div id="login-screen">

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,onSnapshot,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fc={apiKey:"AIzaSyBXp9LcuziUEENL602m2kfl00UyI9TVpVo",authDomain:"italy-mykonos-2026.firebaseapp.com",projectId:"italy-mykonos-2026",storageBucket:"italy-mykonos-2026.firebasestorage.app",messagingSenderId:"416841631175",appId:"1:416841631175:web:3242c0c8e19eeb30c045e2"};
const fa=initializeApp(fc),db=getFirestore(fa);

const UM={sammy:{p:"Sammy2026",name:"Sammy"},milton:{p:"Milton2026",name:"Milton"},sofia:{p:"Sofia2026",name:"Sofia"},dua:{p:"Dua2026",name:"Dua"}};
const USERS=["Sammy","Milton","Sofia","Dua"];
const UC={Sammy:"#534AB7",Milton:"#1D9E75",Sofia:"#D4537E",Dua:"#EF9F27"};

const TRIP=[
  {segment:"Italy \u00b7 July 19\u201325",days:[
    {id:"day1",date:"Sun July 19",location:"Rome",note:"Arrive midday by flight",badge:"Day 1"},
    {id:"day2",date:"Mon July 20",location:"Florence",note:"Morning train from Rome",badge:"Day 2"},
    {id:"day3",date:"Tue July 21",location:"Naples \u2192 Amalfi Coast",note:"Train to Naples, lunch, Sorrento/Positano/Amalfi",badge:"Day 3"},
    {id:"day4",date:"Wed July 22",location:"Amalfi Coast",note:"Sorrento / Positano / Amalfi",badge:"Day 4"},
    {id:"day5",date:"Thu July 23",location:"Back to Rome",note:"Morning departure from Amalfi",badge:"Day 5"},
    {id:"day6",date:"Fri July 24",location:"Rome",note:"Full day in Rome",badge:"Day 6"},
    {id:"day7",date:"Sat July 25",location:"Rome \u2192 Athens",note:"Day in Rome, evening flight to Athens",badge:"Day 7"}
  ]},
  {segment:"Athens \u00b7 July 26",days:[{id:"day8",date:"Sun July 26",location:"Athens",note:"One night layover",badge:"Day 8"}]},
  {segment:"Mykonos \u00b7 July 27\u201330",days:[
    {id:"day9",date:"Mon July 27",location:"Mykonos",note:"Fly Athens \u2192 Mykonos",badge:"Day 9"},
    {id:"day10",date:"Tue July 28",location:"Mykonos",note:"",badge:"Day 10"},
    {id:"day11",date:"Wed July 29",location:"Mykonos",note:"",badge:"Day 11"},
    {id:"day12",date:"Thu July 30",location:"Mykonos \u2192 Athens",note:"Late night flight back",badge:"Day 12"}
  ]}
];

const HN_MAP={day1:"hotel-rome1",day2:"hotel-florence",day3:"hotel-amalfi1",day4:"hotel-amalfi2",day5:"hotel-rome2",day6:"hotel-rome3",day7:null,day8:"hotel-athens",day9:"hotel-mykonos",day10:"hotel-mykonos",day11:"hotel-mykonos",day12:null};
const HN=[
  {id:"hotel-rome1",label:"Rome \u2014 Night 1",dates:"July 19",segment:"Italy"},
  {id:"hotel-florence",label:"Florence",dates:"July 20",segment:"Italy"},
  {id:"hotel-amalfi1",label:"Amalfi Coast \u2014 Night 1",dates:"July 21",segment:"Italy"},
  {id:"hotel-amalfi2",label:"Amalfi Coast \u2014 Night 2",dates:"July 22",segment:"Italy"},
  {id:"hotel-rome2",label:"Rome \u2014 Night 2",dates:"July 23",segment:"Italy"},
  {id:"hotel-rome3",label:"Rome \u2014 Night 3",dates:"July 24",segment:"Italy"},
  {id:"hotel-athens",label:"Athens",dates:"July 26",segment:"Athens"},
  {id:"hotel-mykonos",label:"Mykonos",dates:"July 27\u201330 (3 nights)",segment:"Mykonos"}
];

let cun=null,amc=null,vmc=null,ao={},us=[];
const ge=id=>document.getElementById(id);
const cs=o=>{if(!o.votes||!Object.keys(o.votes).length)return null;const v=Object.values(o.votes);return(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1)};
const gso=(did,st)=>Object.values(ao).filter(o=>o.dayId===did&&o.slotType===st);
const getBest=opts=>{if(!opts.length)return null;return[...opts].sort((a,b)=>(parseFloat(cs(b)||0))-(parseFloat(cs(a)||0)))[0]};
const isFullyLocked=o=>!!(o.lockedBy&&USERS.every(u=>o.lockedBy[u]));
const lockedCount=o=>o.lockedBy?USERS.filter(u=>o.lockedBy[u]).length:0;
const toast=msg=>{const t=ge("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500)};

window.toggleDetails=function(id){
  const d=ge("det-"+id),b=ge("exp-"+id);
  if(!d)return;
  const open=d.classList.toggle("open");
  if(b)b.textContent=open?"\u25B2":"\u25BC";
};

window.deleteOption=async function(id){
  if(!confirm("Delete this option?"))return;
  try{await deleteDoc(doc(db,"options",id));toast("Deleted");}
  catch(e){toast("Error: "+e.message)}
};

window.toggleLock=async function(optId){
  const opt=ao[optId];if(!opt||!cun)return;
  const already=opt.lockedBy&&opt.lockedBy[cun];
  try{
    await updateDoc(doc(db,"options",optId),{[`lockedBy.${cun}`]:already?null:true});
    if(!already){
      const newLocked={...(opt.lockedBy||{}),[cun]:true};
      if(USERS.every(u=>newLocked[u]))toast("\uD83D\uDD12 Locked in by everyone! \uD83C\uDF89");
      else toast("You confirmed \u2713");
    }else{toast("Confirmation removed")}
  }catch(e){toast("Error: "+e.message)}
};

function buildLockRow(opt){
  const lb=opt.lockedBy||{};
  const allLocked=isFullyLocked(opt);
  const cnt=lockedCount(opt);
  const row=document.createElement("div");
  row.className="lock-row";

  const circles=document.createElement("div");
  circles.className="lock-circles";
  USERS.forEach(name=>{
    const isLocked=!!(lb[name]);
    const c=document.createElement("div");
    c.className="lock-circle"+(isLocked?` locked lc-${name}`:"")+(name===cun?" mine":"");
    c.title=isLocked?`${name} confirmed`:name===cun?"Tap to confirm":name+" hasn't confirmed";
    c.textContent=name[0];
    if(name===cun)c.addEventListener("click",e=>{e.stopPropagation();window.toggleLock(opt.id)});
    circles.appendChild(c);
  });

  const status=document.createElement("div");
  status.className="lock-status";

  // Icon: gold lock if all confirmed, grey open circle if not
  const icon=document.createElement("span");
  icon.className="lock-status-icon";
  if(allLocked){
    icon.textContent="\uD83D\uDD12";
    icon.classList.add("pop");
  } else {
    icon.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>`;
  }

  const label=document.createElement("span");
  label.className="lock-status-label"+(allLocked?" confirmed":"");
  label.textContent=allLocked?"\u2713 All confirmed!":cnt+"/4 confirmed";

  status.appendChild(icon);
  status.appendChild(label);
  row.appendChild(circles);
  row.appendChild(status);
  return row;
}

function buildOptCard(opt,did,st,isW){
  const score=cs(opt);
  const hasExtra=!!(opt.link||opt.notes||opt.addedBy);
  const isMine=opt.addedBy===cun;
  const locked=isFullyLocked(opt);

  const el=document.createElement("div");
  el.className="opt-card"+(locked?" locked-in":isW?" winner":"");

  const row=document.createElement("div");row.className="opt-row";
  const nameSpan=document.createElement("span");nameSpan.className="opt-name";nameSpan.title=opt.name;nameSpan.textContent=opt.name;row.appendChild(nameSpan);
  const scoreSpan=document.createElement("span");scoreSpan.className="opt-score"+(isW?" top":"");scoreSpan.textContent=score||"-";
  if(!score){scoreSpan.style.background="#f5f5f5";scoreSpan.style.color="#bbb";}row.appendChild(scoreSpan);

  if(hasExtra){
    const expBtn=document.createElement("button");expBtn.className="opt-expand";expBtn.id="exp-"+opt.id;expBtn.textContent="\u25BC";
    expBtn.addEventListener("click",e=>{e.stopPropagation();window.toggleDetails(opt.id)});row.appendChild(expBtn);
  }
  if(isMine){
    const delBtn=document.createElement("button");delBtn.className="opt-delete";delBtn.title="Delete";delBtn.innerHTML="&#128465;";
    delBtn.addEventListener("click",e=>{e.stopPropagation();window.deleteOption(opt.id)});row.appendChild(delBtn);
  }
  row.addEventListener("click",()=>openVote(did,st));
  el.appendChild(row);

  if(hasExtra){
    const det=document.createElement("div");det.className="opt-details";det.id="det-"+opt.id;
    if(opt.link){const r=document.createElement("div");r.className="det-row";r.innerHTML=`<span class="det-lbl">Link</span><a href="${opt.link}" target="_blank" onclick="event.stopPropagation()">${opt.link}</a>`;det.appendChild(r);}
    if(opt.notes){const r=document.createElement("div");r.className="det-row";r.innerHTML=`<span class="det-lbl">Notes</span><span>${opt.notes}</span>`;det.appendChild(r);}
    if(opt.addedBy){const r=document.createElement("div");r.className="det-row";r.innerHTML=`<span class="det-lbl">By</span><span>${opt.addedBy}</span>`;det.appendChild(r);}
    el.appendChild(det);
  }
  el.appendChild(buildLockRow(opt));
  return el;
}

// LOGIN
ge("login-btn").addEventListener("click",()=>{
  const u=ge("login-username").value.trim().toLowerCase();
  const p=ge("login-password").value;
  const err=ge("login-error");err.textContent="";
  const m=UM[u];
  if(!m){err.textContent="Username not found.";return}
  if(p!==m.p){err.textContent="Incorrect password.";return}
  cun=m.name;
  ge("login-screen").style.display="none";ge("app").style.display="block";
  USERS.forEach(n=>{const el=ge("avi-"+n);if(el)el.style.opacity=n===cun?"1":"0.4"});
  initApp();
});
ge("login-password").addEventListener("keydown",e=>{if(e.key==="Enter")ge("login-btn").click()});
ge("login-username").addEventListener("keydown",e=>{if(e.key==="Enter")ge("login-password").focus()});
ge("logout-btn").addEventListener("click",()=>{
  cun=null;us.forEach(u=>u());us=[];
  ge("login-screen").style.display="flex";ge("app").style.display="none";
  ge("login-username").value="";ge("login-password").value="";
  USERS.forEach(n=>{const el=ge("avi-"+n);if(el)el.style.opacity="1"});
});

const ALL_TABS=["itinerary","hotels","restaurants","activities","leaderboard","final"];
document.querySelectorAll(".nav-tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active"));
    ALL_TABS.forEach(t=>ge("tab-"+t).classList.add("hidden"));
    tab.classList.add("active");ge("tab-"+tab.dataset.tab).classList.remove("hidden");
  });
});

ge("cancel-add").addEventListener("click",closeAdd);
ge("submit-add").addEventListener("click",submitAdd);
ge("add-modal").addEventListener("click",e=>{if(e.target===ge("add-modal"))closeAdd()});
ge("cancel-vote").addEventListener("click",closeVote);
ge("submit-vote").addEventListener("click",submitVotes);
ge("vote-modal").addEventListener("click",e=>{if(e.target===ge("vote-modal"))closeVote()});
ge("detail-close").addEventListener("click",closeDetail);
ge("detail-panel").addEventListener("click",e=>{if(e.target===ge("detail-panel"))closeDetail()});

function closeDetail(){ge("detail-panel").classList.add("hidden")}
function openDetail(title,subtitle,bodyFn){
  ge("detail-title").textContent=title;ge("detail-subtitle").textContent=subtitle||"";
  const body=ge("detail-body");body.innerHTML="";bodyFn(body);
  ge("detail-panel").classList.remove("hidden");
}

function initApp(){renderItinerary();renderHotels();subscribe()}

function subscribe(){
  const u=onSnapshot(collection(db,"options"),snap=>{
    ao={};snap.forEach(d=>{ao[d.id]={id:d.id,...d.data()}});
    updateStats();renderItinerary();updateHotelSlots();updateRestTab();updateActTab();updateLeaderboard();updateFinalPlan();
  });
  us.push(u);
}

function updateStats(){
  let v=0;Object.values(ao).forEach(o=>{if(o.votes)v+=Object.keys(o.votes).length});
  ge("stat-options").textContent=Object.values(ao).length;ge("stat-votes").textContent=v;
}

function renderItinerary(){
  const c=ge("itinerary-list");c.innerHTML="";
  TRIP.forEach(seg=>{
    const sl=document.createElement("div");sl.className="section-label";sl.textContent=seg.segment;c.appendChild(sl);
    seg.days.forEach(day=>{
      const hotelId=HN_MAP[day.id];
      const hotelOpts=hotelId?Object.values(ao).filter(o=>o.dayId===hotelId&&o.slotType==="Hotel"):[];
      const mealOpts=["Breakfast","Lunch","Dinner"].flatMap(st=>gso(day.id,st));
      const actOpts=gso(day.id,"Activity");
      const topHotel=getBest(hotelOpts),topMeal=getBest(mealOpts),topAct=getBest(actOpts);
      const hLocked=topHotel&&isFullyLocked(topHotel);
      const mLocked=topMeal&&isFullyLocked(topMeal);
      const aLocked=topAct&&isFullyLocked(topAct);

      const card=document.createElement("div");card.className="day-card";
      card.innerHTML=`
        <div class="day-header">
          <div class="day-header-left"><h3>${day.date} \u2014 ${day.location}</h3><p>${day.note}</p></div>
          <div class="day-badge">${day.badge}</div>
        </div>
        <div class="day-boxes">
          <div class="day-box" id="box-hotel-${day.id}" style="${hLocked?"border-color:#F5A623;background:#FFFBF0":""}">
            <div class="day-box-icon">${hLocked?"\uD83D\uDD12":"\uD83C\uDFE8"}</div>
            <div class="day-box-label">Hotel</div>
            <div class="day-box-count">${hotelOpts.length} option${hotelOpts.length!==1?"s":""}</div>
            ${topHotel?`<div class="day-box-winner">${topHotel.name}</div>`:""}
            ${topHotel&&cs(topHotel)?`<div class="day-box-score">${cs(topHotel)}</div>`:""}
          </div>
          <div class="day-box" id="box-meals-${day.id}" style="${mLocked?"border-color:#F5A623;background:#FFFBF0":""}">
            <div class="day-box-icon">${mLocked?"\uD83D\uDD12":"\uD83C\uDF7D\uFE0F"}</div>
            <div class="day-box-label">Meals</div>
            <div class="day-box-count">${mealOpts.length} option${mealOpts.length!==1?"s":""}</div>
            ${topMeal?`<div class="day-box-winner">${topMeal.name}</div>`:""}
            ${topMeal&&cs(topMeal)?`<div class="day-box-score">${cs(topMeal)}</div>`:""}
          </div>
          <div class="day-box" id="box-act-${day.id}" style="${aLocked?"border-color:#F5A623;background:#FFFBF0":""}">
            <div class="day-box-icon">${aLocked?"\uD83D\uDD12":"\uD83C\uDFAF"}</div>
            <div class="day-box-label">Activities</div>
            <div class="day-box-count">${actOpts.length} option${actOpts.length!==1?"s":""}</div>
            ${topAct?`<div class="day-box-winner">${topAct.name}</div>`:""}
            ${topAct&&cs(topAct)?`<div class="day-box-score">${cs(topAct)}</div>`:""}
          </div>
        </div>`;
      c.appendChild(card);

      card.querySelector("#box-hotel-"+day.id).addEventListener("click",()=>{
        if(!hotelId){toast("No hotel for this day");return}
        openDetail("\uD83C\uDFE8 Hotel",day.date+" \u2014 "+day.location,body=>{
          const opts=Object.values(ao).filter(o=>o.dayId===hotelId&&o.slotType==="Hotel").sort((a,b)=>(parseFloat(cs(b)||0))-(parseFloat(cs(a)||0)));
          if(!opts.length)body.innerHTML='<div class="empty-state">No hotel options yet</div>';
          else opts.forEach((opt,i)=>body.appendChild(buildOptCard(opt,hotelId,"Hotel",i===0&&cs(opt)!==null)));
          const btn=document.createElement("button");btn.className="add-option-btn";btn.textContent="+ Add hotel option";btn.onclick=()=>{closeDetail();openAdd(hotelId,"Hotel")};body.appendChild(btn);
        });
      });

      card.querySelector("#box-meals-"+day.id).addEventListener("click",()=>{
        openDetail("\uD83C\uDF7D\uFE0F Meals",day.date+" \u2014 "+day.location,body=>{
          ["Breakfast","Lunch","Dinner"].forEach(type=>{
            const icon=type==="Breakfast"?"\uD83C\uDF05":type==="Lunch"?"\u2600\uFE0F":"\uD83C\uDF19";
            const sec=document.createElement("div");sec.className="detail-section";
            sec.innerHTML=`<div class="detail-section-title">${icon} ${type}</div>`;
            const opts=gso(day.id,type).sort((a,b)=>(parseFloat(cs(b)||0))-(parseFloat(cs(a)||0)));
            if(!opts.length)sec.innerHTML+=`<div class="empty-state" style="padding:.5rem 0;font-size:12px">No options yet</div>`;
            else opts.forEach((opt,i)=>sec.appendChild(buildOptCard(opt,day.id,type,i===0&&cs(opt)!==null)));
            const btn=document.createElement("button");btn.className="add-option-btn";btn.textContent=`+ Add ${type.toLowerCase()}`;btn.onclick=()=>{closeDetail();openAdd(day.id,type)};sec.appendChild(btn);
            body.appendChild(sec);
          });
        });
      });

      card.querySelector("#box-act-"+day.id).addEventListener("click",()=>{
        openDetail("\uD83C\uDFAF Activities",day.date+" \u2014 "+day.location,body=>{
          const opts=gso(day.id,"Activity").sort((a,b)=>(parseFloat(cs(b)||0))-(parseFloat(cs(a)||0)));
          if(!opts.length)body.innerHTML='<div class="empty-state">No activities yet</div>';
          else opts.forEach((opt,i)=>body.appendChild(buildOptCard(opt,day.id,"Activity",i===0&&cs(opt)!==null)));
          const btn=document.createElement("button");btn.className="add-option-btn";btn.textContent="+ Add activity";btn.onclick=()=>{closeDetail();openAdd(day.id,"Activity")};body.appendChild(btn);
        });
      });
    });
  });
}

function renderHotels(){
  const c=ge("hotels-list");c.innerHTML="";let last="";
  HN.forEach(h=>{
    if(h.segment!==last){const sl=document.createElement("div");sl.className="section-label";sl.textContent=h.segment;c.appendChild(sl);last=h.segment}
    const card=document.createElement("div");card.className="hotel-card";
    card.innerHTML=`<div class="hotel-header"><div class="hotel-icon">\uD83C\uDFE8</div><div class="hotel-header-text"><h3>${h.label}</h3><p>${h.dates}</p></div></div><div class="hotel-body" id="hbody-${h.id}"></div>`;
    c.appendChild(card);
  });
}
function updateHotelSlots(){
  HN.forEach(h=>{
    const c=ge("hbody-"+h.id);if(!c)return;c.innerHTML="";
    const opts=Object.values(ao).filter(o=>o.dayId===h.id&&o.slotType==="Hotel").sort((a,b)=>(parseFloat(cs(b)||0))-(parseFloat(cs(a)||0)));
    opts.forEach((opt,i)=>c.appendChild(buildOptCard(opt,h.id,"Hotel",i===0&&cs(opt)!==null)));
    const btn=document.createElement("button");btn.className="add-option-btn";btn.textContent="+ Add hotel option";btn.onclick=()=>openAdd(h.id,"Hotel");c.appendChild(btn);
  });
}

function updateRestTab(){
  const c=ge("restaurants-list");if(!c)return;c.innerHTML="";let any=false;
  TRIP.forEach(seg=>{
    let sa=false;
    seg.days.forEach(day=>{
      ["Breakfast","Lunch","Dinner"].forEach(type=>{
        const opts=gso(day.id,type);if(!opts.length)return;any=true;
        if(!sa){const sl=document.createElement("div");sl.className="section-label";sl.textContent=seg.segment;c.appendChild(sl);sa=true}
        const card=document.createElement("div");card.className="hotel-card";
        const icon=type==="Breakfast"?"\uD83E\uDD50":type==="Lunch"?"\uD83C\uDF5D":"\uD83C\uDF77";
        card.innerHTML=`<div class="hotel-header"><div class="hotel-icon">${icon}</div><div class="hotel-header-text"><h3>${day.date} \u2014 ${type}</h3><p>${day.location}</p></div></div><div class="hotel-body" id="rb-${day.id}-${type}"></div>`;
        c.appendChild(card);
        const body=ge("rb-"+day.id+"-"+type);
        opts.sort((a,b)=>(parseFloat(cs(b)||0))-(parseFloat(cs(a)||0))).forEach((opt,i)=>body.appendChild(buildOptCard(opt,day.id,type,i===0&&cs(opt)!==null)));
        const btn=document.createElement("button");btn.className="add-option-btn";btn.textContent="+ Add option";btn.onclick=()=>openAdd(day.id,type);body.appendChild(btn);
      });
    });
  });
  if(!any)c.innerHTML='<div class="loading">No restaurant options yet.<br>Add them from the Itinerary tab!</div>';
}

function updateActTab(){
  const c=ge("activities-list");if(!c)return;c.innerHTML="";let any=false;
  TRIP.forEach(seg=>{
    let sa=false;
    seg.days.forEach(day=>{
      const opts=gso(day.id,"Activity");if(!opts.length)return;any=true;
      if(!sa){const sl=document.createElement("div");sl.className="section-label";sl.textContent=seg.segment;c.appendChild(sl);sa=true}
      const card=document.createElement("div");card.className="hotel-card";
      card.innerHTML=`<div class="hotel-header"><div class="hotel-icon">\uD83C\uDFAF</div><div class="hotel-header-text"><h3>${day.date}</h3><p>${day.location}</p></div></div><div class="hotel-body" id="ab-${day.id}"></div>`;
      c.appendChild(card);
      const body=ge("ab-"+day.id);
      opts.sort((a,b)=>(parseFloat(cs(b)||0))-(parseFloat(cs(a)||0))).forEach((opt,i)=>body.appendChild(buildOptCard(opt,day.id,"Activity",i===0&&cs(opt)!==null)));
      const btn=document.createElement("button");btn.className="add-option-btn";btn.textContent="+ Add activity";btn.onclick=()=>openAdd(day.id,"Activity");body.appendChild(btn);
    });
  });
  if(!any)c.innerHTML='<div class="loading">No activities yet.<br>Add them from the Itinerary tab!</div>';
}

function updateLeaderboard(){
  const c=ge("leaderboard-content");if(!c)return;
  const opts=Object.values(ao);
  const stats={};
  USERS.forEach(u=>{stats[u]={added:0,voted:0,totalGiven:0,totalReceived:0,votedOn:0}});
  opts.forEach(opt=>{
    if(opt.addedBy&&stats[opt.addedBy]){
      stats[opt.addedBy].added++;
      if(opt.votes){const vals=Object.values(opt.votes);if(vals.length){stats[opt.addedBy].totalReceived+=vals.reduce((a,b)=>a+b,0)/vals.length;stats[opt.addedBy].votedOn++;}}
    }
    if(opt.votes)Object.entries(opt.votes).forEach(([voter,score])=>{if(stats[voter]){stats[voter].voted++;stats[voter].totalGiven+=score;}});
  });
  USERS.forEach(u=>{stats[u].avgReceived=stats[u].votedOn>0?(stats[u].totalReceived/stats[u].votedOn).toFixed(1):null;});
  const ranked=[...USERS].sort((a,b)=>(parseFloat(stats[b].avgReceived||0))-(parseFloat(stats[a].avgReceived||0)));
  c.innerHTML="";
  const totalOpts=opts.length,totalVotes=opts.reduce((s,o)=>s+(o.votes?Object.keys(o.votes).length:0),0);
  const rankCard=document.createElement("div");rankCard.className="lb-card";
  rankCard.innerHTML=`<div class="lb-section-title">\uD83C\uDFC6 Overall Leaderboard</div><div class="lb-stat-grid"><div class="lb-stat"><div class="lb-stat-num">${totalOpts}</div><div class="lb-stat-lbl">Options</div></div><div class="lb-stat"><div class="lb-stat-num">${totalVotes}</div><div class="lb-stat-lbl">Votes cast</div></div><div class="lb-stat"><div class="lb-stat-num">${USERS.filter(u=>stats[u].voted>0).length}/4</div><div class="lb-stat-lbl">Active</div></div></div>`;
  ranked.forEach((name,i)=>{
    const s=stats[name];
    const emoji=i===0?"\uD83E\uDD47":i===1?"\uD83E\uDD48":i===2?"\uD83E\uDD49":`${i+1}`;
    const rankClass=i===0?"gold":i===1?"silver":i===2?"bronze":"";
    const barW=s.avgReceived?(parseFloat(s.avgReceived)/10*100).toFixed(0):0;
    const row=document.createElement("div");row.className="lb-person";
    row.innerHTML=`<div class="lb-rank ${rankClass}">${emoji}</div><div class="lb-avatar av-${name}">${name[0]}</div><div class="lb-info"><div class="lb-name">${name}</div><div class="lb-sub">${s.added} added &middot; ${s.voted} votes cast</div><div class="lb-bar-wrap"><div class="lb-bar" style="width:${barW}%;background:${UC[name]}"></div></div></div><div style="text-align:right"><div class="lb-score">${s.avgReceived||"\u2014"}</div><div class="lb-score-label">avg score</div></div>`;
    rankCard.appendChild(row);
  });
  c.appendChild(rankCard);
  USERS.forEach(name=>{
    const myOpts=opts.filter(o=>o.addedBy===name);if(!myOpts.length)return;
    const card=document.createElement("div");card.className="lb-card";
    card.innerHTML=`<div class="lb-section-title" style="color:${UC[name]}">${name}'s suggestions</div>`;
    myOpts.sort((a,b)=>(parseFloat(cs(b)||0))-(parseFloat(cs(a)||0))).forEach(opt=>{
      const score=cs(opt),vc=opt.votes?Object.keys(opt.votes).length:0;
      const locked=isFullyLocked(opt);
      const row=document.createElement("div");row.style.cssText="display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid #f5f5f5;font-size:13px";
      row.innerHTML=`<div style="flex:1;font-weight:500">${opt.name}${locked?" \uD83D\uDD12":""}</div><div style="font-size:11px;color:#aaa">${vc}/4 votes</div><div style="font-weight:700;color:${UC[name]};min-width:32px;text-align:right">${score||"\u2014"}</div>`;
      card.appendChild(row);
    });
    c.appendChild(card);
  });
  if(!opts.length)c.innerHTML='<div class="loading">No options yet.<br>Start adding from the Itinerary tab!</div>';
}

function updateFinalPlan(){
  const c=ge("final-content");if(!c)return;c.innerHTML="";
  const hero=document.createElement("div");hero.className="final-hero";
  hero.innerHTML=`<h1>&#127470;&#127481; Italy + &#127468;&#127479; Mykonos</h1><p>Summer 2026 &middot; The Final Plan</p><div class="final-hero-dates"><div><div class="final-hero-date-num">July 19</div><div class="final-hero-date-label">Departure</div></div><div><div class="final-hero-date-num">12</div><div class="final-hero-date-label">Days</div></div><div><div class="final-hero-date-num">July 30</div><div class="final-hero-date-label">Return</div></div></div><div class="final-travelers"><div class="final-traveler"><div class="final-traveler-av av-Sammy">S</div><span class="final-traveler-name">Sammy</span></div><div class="final-traveler"><div class="final-traveler-av av-Milton">M</div><span class="final-traveler-name">Milton</span></div><div class="final-traveler"><div class="final-traveler-av av-Sofia">So</div><span class="final-traveler-name">Sofia</span></div><div class="final-traveler"><div class="final-traveler-av av-Dua">D</div><span class="final-traveler-name">Dua</span></div></div>`;
  c.appendChild(hero);

  function makeFinalItem(typeClass,icon,label,opt){
    const el=document.createElement("div");
    if(opt){
      const score=cs(opt);
      const locked=isFullyLocked(opt);
      const lb=opt.lockedBy||{};
      el.className=`final-item ${typeClass}${locked?" fi-locked":""}`;

      const iconDiv=document.createElement("div");iconDiv.className="final-item-icon";
      iconDiv.textContent=locked?"\uD83D\uDD12":icon;

      const info=document.createElement("div");info.className="final-item-info";
      info.innerHTML=`<div class="final-item-label">${label}</div><div class="final-item-name">${opt.name}</div><div class="final-item-sub">${score?"Score: "+score+"\u2009\u00b7\u2009":""} ${opt.addedBy?"Added by "+opt.addedBy:""}</div>`;

      const right=document.createElement("div");right.className="final-item-right";
      if(score){const sc=document.createElement("span");sc.className="final-item-score";sc.textContent=score;right.appendChild(sc);}

      // Lock circles
      const wrap=document.createElement("div");wrap.className="final-lock-wrap";
      const circles=document.createElement("div");circles.className="final-lock-circles" ;circles.style.display="flex";circles.style.gap="3px";
      USERS.forEach(name=>{
        const isLocked=!!(lb[name]);
        const dot=document.createElement("div");
        dot.className="flc"+(isLocked?` locked lc-${name}`:"");
        dot.title=isLocked?`${name} confirmed`:`${name} hasn't confirmed`;
        dot.textContent=name[0];
        circles.appendChild(dot);
      });

      // Lock icon — gold lock if all confirmed, open SVG if not
      const lockIcon=document.createElement("span");
      lockIcon.className="final-lock-icon";
      if(locked){
        lockIcon.textContent="\uD83D\uDD12";
        lockIcon.style.filter="drop-shadow(0 0 4px #F5A623)";
      } else {
        lockIcon.innerHTML=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>`;
      }

      wrap.appendChild(circles);
      wrap.appendChild(lockIcon);
      right.appendChild(wrap);

      el.appendChild(iconDiv);el.appendChild(info);el.appendChild(right);
    } else {
      el.className="final-item fi-pending";
      el.innerHTML=`<div class="final-item-icon">\u2026</div><div class="final-item-info"><div class="final-item-label">${label}</div><div class="final-item-pending">Not selected yet</div></div>`;
    }
    return el;
  }

  TRIP.forEach(seg=>{
    const segEl=document.createElement("div");segEl.className="final-segment";
    segEl.innerHTML=`<div class="final-segment-header"><div class="final-segment-line"></div><div class="final-segment-label">${seg.segment}</div><div class="final-segment-line"></div></div>`;
    seg.days.forEach(day=>{
      const dayEl=document.createElement("div");dayEl.className="final-day";
      dayEl.innerHTML=`<div class="final-day-header"><div><div class="final-day-date">${day.date}</div><div class="final-day-location">${day.location}</div></div><div class="final-day-badge">${day.badge}</div></div>`;
      const items=document.createElement("div");items.className="final-items";
      const hotelId=HN_MAP[day.id];
      if(hotelId){const opts=Object.values(ao).filter(o=>o.dayId===hotelId&&o.slotType==="Hotel");items.appendChild(makeFinalItem("fi-hotel","\uD83C\uDFE8","Hotel",getBest(opts)));}
      const topB=getBest(gso(day.id,"Breakfast"));if(topB)items.appendChild(makeFinalItem("fi-meal","\uD83C\uDF05","Breakfast",topB));
      const topL=getBest(gso(day.id,"Lunch"));if(topL)items.appendChild(makeFinalItem("fi-meal","\u2600\uFE0F","Lunch",topL));
      const topD=getBest(gso(day.id,"Dinner"));if(topD)items.appendChild(makeFinalItem("fi-meal","\uD83C\uDF19","Dinner",topD));
      if(!topB&&!topL&&!topD)items.appendChild(makeFinalItem("fi-meal","\uD83C\uDF7D\uFE0F","Meals",null));
      const topA=getBest(gso(day.id,"Activity"));items.appendChild(makeFinalItem("fi-act","\uD83C\uDFAF","Activity",topA));
      dayEl.appendChild(items);segEl.appendChild(dayEl);
    });
    c.appendChild(segEl);
  });
}

window.openAdd=function(did,st){
  amc={did,st};
  const titles={Hotel:"Add Hotel Option",Breakfast:"Add Breakfast",Lunch:"Add Lunch",Dinner:"Add Dinner",Activity:"Add Activity"};
  ge("add-modal-title").textContent=titles[st]||"Add Option";
  ge("add-name").value="";ge("add-link").value="";ge("add-notes").value="";
  ge("add-modal").classList.remove("hidden");
  setTimeout(()=>ge("add-name").focus(),100);
};
function closeAdd(){ge("add-modal").classList.add("hidden");amc=null}
async function submitAdd(){
  const name=ge("add-name").value.trim();if(!name){toast("Please enter a name");return}
  const link=ge("add-link").value.trim(),notes=ge("add-notes").value.trim();if(!amc)return;
  try{
    await addDoc(collection(db,"options"),{dayId:amc.did,slotType:amc.st,name,link:link||null,notes:notes||null,addedBy:cun,votes:{},lockedBy:{},createdAt:serverTimestamp()});
    closeAdd();toast("Added! \u2713");
  }catch(e){toast("Error: "+e.message)}
}

window.openVote=function(did,st){
  vmc={did,st};
  const opts=st==="Hotel"?Object.values(ao).filter(o=>o.dayId===did&&o.slotType==="Hotel"):gso(did,st);
  if(!opts.length){window.openAdd(did,st);return}
  const labels={Hotel:"Vote on Hotels",Breakfast:"Vote \u2014 Breakfast",Lunch:"Vote \u2014 Lunch",Dinner:"Vote \u2014 Dinner",Activity:"Vote \u2014 Activities"};
  ge("vote-modal-title").textContent=labels[st]||"Vote";
  const list=ge("vote-list");list.innerHTML="";
  opts.forEach(opt=>{
    const myVote=opt.votes&&opt.votes[cun]?opt.votes[cun]:0;
    const avg=cs(opt),vc=opt.votes?Object.keys(opt.votes).length:0;
    const item=document.createElement("div");item.className="vote-item";
    item.innerHTML=`<div style="flex:1;min-width:0"><div class="vote-item-name">${opt.name}</div>${opt.link?`<a class="vote-item-link" href="${opt.link}" target="_blank">View link \u2192</a>`:""} ${opt.notes?`<div style="font-size:11px;color:#888;margin-top:2px">${opt.notes}</div>`:""}<div style="font-size:11px;color:#888;margin-top:3px">${vc}/4 voted${avg?" \u00b7 avg "+avg:""}</div><div class="vote-progress"><div class="vote-progress-fill" style="width:${(vc/4)*100}%"></div></div></div><div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div id="stars-${opt.id}" style="display:flex;flex-direction:column;gap:3px"></div><div class="vote-score-display" id="sd-${opt.id}">${myVote||"\u2014"}</div></div>`;
    list.appendChild(item);
    const se=item.querySelector("#stars-"+opt.id);
    const r1=document.createElement("div");r1.style.cssText="display:flex;gap:3px";
    const r2=document.createElement("div");r2.style.cssText="display:flex;gap:3px";
    for(let i=1;i<=10;i++){
      const s=document.createElement("div");s.className="star"+(myVote>=i?" selected":"");s.textContent=i;
      s.dataset.oid=opt.id;s.dataset.v=i;
      s.onclick=()=>{document.querySelectorAll(`.star[data-oid="${opt.id}"]`).forEach(x=>x.classList.toggle("selected",parseInt(x.dataset.v)<=i));ge("sd-"+opt.id).textContent=i};
      (i<=5?r1:r2).appendChild(s);
    }
    se.appendChild(r1);se.appendChild(r2);
  });
  ge("vote-modal").classList.remove("hidden");
};
function closeVote(){ge("vote-modal").classList.add("hidden");vmc=null}
async function submitVotes(){
  if(!vmc)return;
  const opts=vmc.st==="Hotel"?Object.values(ao).filter(o=>o.dayId===vmc.did&&o.slotType==="Hotel"):gso(vmc.did,vmc.st);
  const ps=[];
  opts.forEach(opt=>{
    const sd=ge("sd-"+opt.id),val=sd?parseInt(sd.textContent):null;
    if(val&&!isNaN(val))ps.push(updateDoc(doc(db,"options",opt.id),{[`votes.${cun}`]:val}));
  });
  if(!ps.length){toast("No votes to save");return}
  try{await Promise.all(ps);closeVote();toast("Votes saved! \u2713")}
  catch(e){toast("Error: "+e.message)}
}
</script>
